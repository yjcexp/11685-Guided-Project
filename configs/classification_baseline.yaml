model:
  name: baseline_mlp
  input_dim: null  # Will be set dynamically based on EEG shape
  hidden_dims: [256, 128]
  num_classes: null  # Will be set dynamically

data:
  metadata_path: data/processed/metadata.csv
  split_dir: data/splits
  batch_size: 32

training:
  num_epochs: 50
  learning_rate: 0.001
  weight_decay: 1e-4
  device: cuda
  seed: 42

output:
  checkpoint_dir: outputs/checkpoints
  log_dir: outputs/logs
  save_every: 5
