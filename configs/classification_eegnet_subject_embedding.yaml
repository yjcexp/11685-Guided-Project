dataset_root: /ocean/projects/cis250019p/gandotra/11785-gp-eeg
metadata_csv: data/processed/metadata.csv
train_split_csv: data/splits/train.csv
val_split_csv: data/splits/val.csv
test_split_csv: data/splits/test.csv

model_name: eegnet_subject_embedding
num_classes: 20
num_channels: 122
num_timesteps: 500
num_subjects: 13

batch_size: 64
num_workers: 4
lr: 0.0005
weight_decay: 0.0001
epochs: 30
normalization: zscore_per_trial
seed: 42
device: cuda
output_dir: outputs

temporal_filters: 16
depth_multiplier: 2
separable_filters: 32
dropout: 0.25

subject_embedding_dim: 32
classifier_hidden_dim: 128
fuse_mode: concat

wandb:
  enabled: true
  entity: yejc20
  project: eeg-task1
  run_name: null
  mode: online
