dataset_root: /ocean/projects/cis250019p/gandotra/11785-gp-eeg
metadata_csv: data/processed/metadata.csv
train_split_csv: data/splits/train.csv
val_split_csv: data/splits/val.csv
test_split_csv: data/splits/test.csv

model_name: subject_conditioned_multiscale_eegnet
num_classes: 20
num_channels: 122
num_timesteps: 500
num_subjects: 13

temporal_filters: 8
branch_kernel_sizes: [15, 31, 63]
depth_multiplier: 2
separable_filters: 64
num_refinement_blocks: 2
refinement_kernel_size: 15
stem_pool_kernel: 4
embedding_dim: 256
subject_embedding_dim: 32
projection_dim: 256
projection_hidden_dim: 256
projection_dropout: 0.1
normalize_projected_embedding: true
dropout: 0.3

batch_size: 64
num_workers: 4
lr: 0.0005
weight_decay: 0.0001
epochs: 30
normalization: zscore_per_trial
label_smoothing: 0.05
scheduler: cosine
scheduler_eta_min: 1.0e-5
seed: 42
device: cuda
output_dir: outputs

wandb:
  enabled: true
  entity: yejc20
  project: eeg-task1
  run_name: null
  mode: online
