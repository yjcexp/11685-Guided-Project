dataset_root: /ocean/projects/cis250019p/gandotra/11785-gp-eeg
metadata_csv: data/processed/metadata.csv
train_split_csv: data/splits/train.csv
val_split_csv: data/splits/val.csv
test_split_csv: data/splits/test.csv

model_name: eegnet_residual_encoder
num_classes: 20
num_channels: 122
num_timesteps: 500
time_window_start: 100
time_window_end: 300

normalization: demean_only

temporal_filters: 24
temporal_kernel_size: 32
depth_multiplier: 2
separable_filters: 96
separable_kernel_size: 8
pool1_kernel_size: 2
pool2_kernel_size: 2
num_refinement_blocks: 1
refinement_kernel_size: 7
use_gated_pooling: true
dropout: 0.1

embedding_dim: 256
projection_dim: 256
projection_hidden_dim: 256
projection_dropout: 0.1
normalize_projected_embedding: true

batch_size: 64
num_workers: 4
lr: 0.0008
weight_decay: 0.0001
epochs: 30
label_smoothing: 0.02
scheduler: cosine
scheduler_eta_min: 1.0e-5
seed: 42
device: cuda

output_dir: outputs

wandb:
  enabled: true
  entity: yejc20
  project: eeg-task1
  run_name: null
  mode: online
